{% extends 'layout.html'%}
{% load static %}

{% block title%}
  Login
{%endblock%}



{%block content%}
  
    <div style="margin-bottom: 10px; text-align:center">Login</div>

        {% csrf_token %}
        {{form.as_p}}

        <button class="form_submit_btn" type="submit">Login</button>
    </form> 

{% endblock %}
